<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Component</title>

    <style>
        body{
            background-color: hsl(212,45%,89%);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 100vh;
        }
        h1{
            color: hsl(218,44%,22%);
            font-size: 22px;
            line-height: 1.2;
        }
        p{
            color: hsl(216,15%,48%);
            font-size: 15px;
        }
        img{
            max-width: 100%;
            border-radius: 20px;
        }
        div{
            background-color: hsl(0,0%,100%);
            width: 80%;
            max-width: 280px;
            padding: 1rem;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/IMG-20260708-WA0008.jpg" alt="QR CODe">
        <h1>Improve your front-end skills by building projects.</h1>
        <p>
            Scan the QR code to visit frontend mentor and take your coding skills to next level.
        </p>
    </div>
</body>
</html>
